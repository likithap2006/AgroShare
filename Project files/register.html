<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – AgroShare</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { padding-top: var(--navbar-height); background: var(--bg-main); }

    .auth-page {
      min-height: calc(100vh - var(--navbar-height));
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      width: 100%; max-width: 480px;
      box-shadow: var(--shadow-lg);
    }

    .auth-title { font-size: 1.6rem; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; text-align:center; }
    .auth-sub   { font-size: 0.88rem; color: var(--text-muted); text-align:center; margin-bottom: 2rem; }

    .role-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem; margin-bottom: 1.5rem;
    }
    .role-btn {
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 8px;
      text-align: center; cursor: pointer;
      background: var(--bg-input);
      transition: var(--transition-fast);
      color: var(--text-secondary);
      font-size: 0.82rem; font-weight: 600;
    }
    .role-btn:hover { border-color: var(--primary); color: var(--primary); }
    .role-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary-dark);
    }
    .role-btn .role-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.88rem; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; }

    .step-indicator {
      display: flex; gap: 6px; justify-content: center;
      margin-bottom: 1.75rem;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); transition: var(--transition-fast);
    }
    .step-dot.active { background: var(--primary); transform: scale(1.3); }
    .step-dot.done   { background: var(--primary); opacity: 0.5; }
  </style>
</head>
<body>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-logo"><span>🌾</span> AgroShare</a>
    <ul class="navbar-links">
      <li><a href="index.html">Home</a></li>
      <li class="nav-auth-only" style="display:none"><a href="marketplace.html">Marketplace</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="theme-toggle" id="themeToggle"><i class="fa fa-moon" id="themeIcon"></i></button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">

      <div style="text-align:center;font-size:2.5rem;margin-bottom:6px">🌾</div>
      <div class="auth-title">Create Account</div>
      <p class="auth-sub">Join thousands of farmers on AgroShare</p>

      <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
      </div>

      <!-- ══ STEP 1 – Role Selection ══ -->
      <div id="step1">
        <p style="font-size:0.88rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.75rem">
          I want to join as:
        </p>
        <div class="role-grid">
          <div class="role-btn" id="role-renter" onclick="selectRole('renter')">
            <span class="role-icon">🧑‍🌾</span> Renter
          </div>
          <div class="role-btn" id="role-owner" onclick="selectRole('owner')">
            <span class="role-icon">🚜</span> Owner
          </div>
          <div class="role-btn" id="role-operator" onclick="selectRole('operator')">
            <span class="role-icon">⚙️</span> Operator
          </div>
        </div>
        <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:1.5rem;line-height:1.5">
          <strong>Renter</strong> – Hire equipment · <strong>Owner</strong> – List & earn · <strong>Operator</strong> – Drive & operate
        </p>
        <button class="btn btn-primary btn-block" onclick="goStep(2)">
          Continue <i class="fa fa-arrow-right"></i>
        </button>
      </div>

      <!-- ══ STEP 2 – Personal Info ══ -->
      <div id="step2" style="display:none">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <div class="input-wrap">
            <i class="fa fa-user"></i>
            <input type="text" id="regName" class="form-input" placeholder="Ramesh Sharma" autocomplete="name" />
          </div>
          <span class="form-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Mobile Number</label>
          <div class="input-wrap">
            <i class="fa fa-phone"></i>
            <input type="tel" id="regMobile" class="form-input" placeholder="9876543210" maxlength="10" autocomplete="tel" />
          </div>
          <span class="form-error" id="mobileError"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Location (Village / District)</label>
          <div class="input-wrap">
            <i class="fa fa-map-marker-alt"></i>
            <input type="text" id="regLocation" class="form-input" placeholder="Pune, Maharashtra" />
          </div>
          <span class="form-error" id="locationError"></span>
        </div>

        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost btn-block" onclick="goStep(1)">
            <i class="fa fa-arrow-left"></i> Back
          </button>
          <button class="btn btn-primary btn-block" onclick="goStep(3)">
            Continue <i class="fa fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- ══ STEP 3 – Email & Password ══ -->
      <div id="step3" style="display:none">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrap">
            <i class="fa fa-envelope"></i>
            <input type="email" id="regEmail" class="form-input"
              placeholder="you@example.com" autocomplete="email" />
          </div>
          <span class="form-error" id="regEmailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <i class="fa fa-lock"></i>
            <input type="password" id="regPassword" class="form-input"
              placeholder="Min. 6 characters" autocomplete="new-password" />
            <button class="pass-toggle" type="button" onclick="togglePass('regPassword', this)">
              <i class="fa fa-eye"></i>
            </button>
          </div>
          <span class="form-error" id="regPassError"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="input-wrap">
            <i class="fa fa-lock"></i>
            <input type="password" id="regConfirm" class="form-input"
              placeholder="Repeat password" autocomplete="new-password" />
            <button class="pass-toggle" type="button" onclick="togglePass('regConfirm', this)">
              <i class="fa fa-eye"></i>
            </button>
          </div>
          <span class="form-error" id="regConfirmError"></span>
        </div>

        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost btn-block" onclick="goStep(2)">
            <i class="fa fa-arrow-left"></i> Back
          </button>
          <button class="btn btn-primary btn-block" id="registerBtn" onclick="doRegister()">
            Create Account
          </button>
        </div>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/navbar.js"></script>
  <script>

    // Redirect if logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'owner-dashboard.html';
    });

    let selectedRole = '';

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('role-' + role).classList.add('selected');
    }

    function togglePass(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.querySelector('i').className = isText ? 'fa fa-eye' : 'fa fa-eye-slash';
    }

    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.textContent = ''; el.classList.remove('show');
      });
    }
    function showError(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.classList.add('show'); }
    }

    function updateDots(step) {
      [1,2,3].forEach(i => {
        const dot = document.getElementById('dot' + i);
        dot.className = 'step-dot' + (i < step ? ' done' : i === step ? ' active' : '');
      });
    }

    function goStep(step) {
      clearErrors();

      // Validate before advancing
      if (step === 2) {
        if (!selectedRole) { showToast('Please select a role to continue.', 'error'); return; }
      }

      if (step === 3) {
        const name     = document.getElementById('regName').value.trim();
        const mobile   = document.getElementById('regMobile').value.trim();
        const location = document.getElementById('regLocation').value.trim();
        let valid = true;
        if (!name)               { showError('nameError',     'Full name is required.');         valid = false; }
        if (!/^\d{10}$/.test(mobile)) { showError('mobileError', 'Enter a valid 10-digit mobile.'); valid = false; }
        if (!location)           { showError('locationError', 'Location is required.');           valid = false; }
        if (!valid) return;
      }

      [1,2,3].forEach(i => {
        document.getElementById('step' + i).style.display = i === step ? 'block' : 'none';
      });
      updateDots(step);
    }

    async function doRegister() {
      clearErrors();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm  = document.getElementById('regConfirm').value;
      const btn      = document.getElementById('registerBtn');

      let valid = true;
      if (!email)               { showError('regEmailError',   'Email is required.');              valid = false; }
      if (password.length < 6)  { showError('regPassError',    'Password must be 6+ characters.'); valid = false; }
      if (password !== confirm)  { showError('regConfirmError', 'Passwords do not match.');         valid = false; }
      if (!valid) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account…';

      try {
        // 1. Create Firebase Auth user
        const cred = await auth.createUserWithEmailAndPassword(email, password);

        // 2. Update display name
        const name = document.getElementById('regName').value.trim();
        await cred.user.updateProfile({ displayName: name });

        // 3. Save profile to Firestore
        await db.collection('users').doc(cred.user.uid).set({
          uid:       cred.user.uid,
          name:      name,
          email:     email,
          mobile:    document.getElementById('regMobile').value.trim(),
          location:  document.getElementById('regLocation').value.trim(),
          role:      selectedRole,
          status:    'active',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showToast('Account created! Redirecting…');
        setTimeout(() => window.location.href = 'owner-dashboard.html', 1000);

      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
        const msg = firebaseErrorMsg(err.code);
        showError('regEmailError', msg);
      }
    }

    function firebaseErrorMsg(code) {
      const map = {
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/weak-password':        'Password must be at least 6 characters.',
        'auth/network-request-failed': 'Network error. Check your connection.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>
</body>
</html>
